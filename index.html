<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Portfolio</title>
    <link rel="stylesheet" href="styles/layout.css" />
  </head>
  <body>
    <div id="M4241487291" class="page">
      <aside class="sidebar page-layout" id="left-nav"></aside>
      <main class="content" id="home"></main>
    </div>
    <footer id="K2528715754" class="page site-footer"><div class="page-layout"><div class="page-content"><span style="color: rgba(0, 0, 0, 0.25);">©2026 Hyesurn Yang.</span></div></div></footer>
    <script type="module">
      const mount = async (selector, filePath) => {
        const target = document.querySelector(selector);
        if (!target) return;
        try {
          const response = await fetch(filePath);
          if (!response.ok) throw new Error(filePath);
          target.innerHTML = await response.text();
        } catch {
          target.innerHTML = '<p>섹션을 불러오지 못했습니다.</p>';
        }
      };

      const enhanceMediaItems = () => {
        const mediaItems = document.querySelectorAll('media-item');
        mediaItems.forEach((mediaItem) => {
          if (mediaItem.querySelector('img')) return;
          const href = mediaItem.getAttribute('href') || 'example-project';
          mediaItem.innerHTML = `<a href="${href}" rel="history"><img src="./assets/project-placeholder.svg" alt="Project image" /></a>`;
        });
      };

      await Promise.all([
        mount('#left-nav', './sections/left-nav.html'),
        mount('#home', './sections/home.html'),
      ]);

      enhanceMediaItems();
    </script>
  </body>
</html>
